<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Particle-Playground</title>
  </head>
  <body>
    <header>
      <h1>Particle-Playground</h1>
      <a href="/Particle-Playground">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#607d8b"
          stroke-width="1"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M19.933 13.041a8 8 0 1 1 -9.925 -8.788c3.899 -1 7.935 1.007 9.425 4.747"
          />
          <path d="M20 4v5h-5" />
        </svg>
      </a>
    </header>
    <main>
      <section class="options-section">
        <button id="play-button">Play</button>
        <button id="add-circle-button">Add circle</button>
      </section>
      <section
        id="circles-list-container"
        class="circles-list-container"
      ></section>
      <section id="circles-container" class="circles-container"></section>
    </main>
    <script src="requestAnimationFrame.js" defer></script>
    <script src="index.js" defer></script>
  </body>
</html>
