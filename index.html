<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Particle-Playground</title>
  </head>
  <body>
    <header><h1>Particle-Playground</h1></header>
    <main>
      <section class="options-section">
        <button id="play-button">Play</button>
        <button id="add-circle-button">Add circle</button>
        <button id="reset-circles-button" disabled="true">Reset</button>
      </section>
      <section
        id="circles-list-container"
        class="circles-list-container"
      ></section>
      <section id="circles-container" class="circles-container"></section>
    </main>
    <script src="index.js" defer></script>
  </body>
</html>
